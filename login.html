<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-Perpustakaan Polines</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="images/logo_polines.png" alt="E-Perpustakaan Polines" class="main-logo">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="catalog.html">Catalog</a></li>
                <li><a href="repository.html">Repository</a></li>
                <li><a href="history.html">History</a></li>
            </ul>
            <div class="nav-actions">
                <a href="profile.html" class="btn-yellow">My Account</a>
            </div>
        </div>
    </nav>

    <main class="login-container">
        <div class="login-card">
            <h1>Welcome</h1>
            <p class="login-subtitle">Masuk ke portal akademik Anda untuk mengakses layanan perpustakaan Anda.</p>

            <form action="#" method="POST" class="login-form">
                <div class="form-group">
                    <label for="username">Email atau NIM</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="e.g. 12345678 @mhs.polines.ac.id" required>
                    </div>
                </div>

                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="• • • • • • • •" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        Stay signed in for 30 days
                    </label>
                </div>

                <button type="submit" class="btn-signin">Sign In →</button>
            </form>
        </div>
    </main>

</body>
</html>
